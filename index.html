<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성공회대학교 동아리 모집</title>

    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- Babel Standalone (JSX 컴파일용) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [data, setData] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('전체');
            const [selectedItem, setSelectedItem] = useState(null);
            const [modalContent, setModalContent] = useState('');

            // data.json 패치
            useEffect(() => {
                fetch('./data.json')
                    .then(res => res.json())
                    .then(jsonData => setData(jsonData))
                    .catch(err => console.error("데이터를 불러오는데 실패했습니다.", err));
            }, []);

            // 모달이 열리면 contents/[keyword].txt 텍스트 파일 내용을 불러옴
            useEffect(() => {
                if (selectedItem) {
                    setModalContent('내용을 불러오는 중...');
                    fetch(`./contents/${selectedItem.keyword}.txt`)
                        .then(res => {
                            if (!res.ok) throw new Error("파일이 없습니다.");
                            return res.text();
                        })
                        .then(text => setModalContent(text))
                        .catch(() => setModalContent("상세 내용을 불러올 수 없습니다."));
                } else {
                    setModalContent('');
                }
            }, [selectedItem]);

            // 카테고리 중복 제거 추출
            const categories = useMemo(() => {
                const cats = data.map(item => item.category).filter(Boolean);
                return ['전체', ...new Set(cats)];
            }, [data]);

            // 필터링 규칙 적용
            const filteredData = useMemo(() => {
                return data.filter(item => {
                    // 1. 카테고리 필터
                    const matchCategory = selectedCategory === '전체' || item.category === selectedCategory;

                    // 2. 검색어 필터 (JSON의 모든 필드를 순회하며 체크)
                    const lowerQuery = searchQuery.toLowerCase();
                    const matchSearch = Object.values(item).some(val =>
                        val != null && String(val).toLowerCase().includes(lowerQuery)
                    );

                    return matchCategory && matchSearch;
                });
            }, [data, selectedCategory, searchQuery]);

            const closeModal = () => setSelectedItem(null);

            return (
                <div className="container mx-auto px-4 py-8">
                    <h1 className="text-3xl font-extrabold text-center mb-8 text-gray-900">성공회대학교 동아리 / 소모임 홍보</h1>

                    {/* 검색 및 카테고리 필터 영역 */}
                    <div className="mb-8 space-y-4 max-w-3xl mx-auto">
                        <input
                            type="text"
                            placeholder="검색어를 입력하세요 (이름, 키워드, 설명 등 모든 항목 검색)"
                            className="w-full p-4 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                        />

                        <div className="flex flex-wrap gap-2 justify-center">
                            {categories.map(cat => (
                                <button
                                    key={cat}
                                    onClick={() => setSelectedCategory(cat)}
                                    className={`px-4 py-2 rounded-full text-sm font-semibold transition-colors duration-200 shadow-sm
                    ${selectedCategory === cat
                                            ? 'bg-blue-600 text-white border-blue-600'
                                            : 'bg-white text-gray-600 border border-gray-300 hover:bg-gray-100'
                                        }`}
                                >
                                    {cat}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* 목록 카드 레이아웃 (반응형 1 -> 2 -> 3) */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filteredData.map(item => (
                            <div
                                key={item.id}
                                onClick={() => setSelectedItem(item)}
                                className="bg-white rounded-2xl shadow-md hover:shadow-xl hover:-translate-y-1 transition-all duration-300 cursor-pointer overflow-hidden border border-gray-100 flex flex-col h-full"
                            >
                                <div className="p-5 sm:p-6 flex-grow flex flex-col">
                                    {/* 1. 상단 영역 (Header) */}
                                    <div className="w-full flex items-center justify-between mb-4">
                                        <span className="bg-blue-50 text-blue-600 text-xs font-bold px-2.5 py-1 rounded-md shrink-0">
                                            {item.category}
                                        </span>
                                        <span className="text-xs text-gray-500 font-medium shrink-0 whitespace-nowrap text-right">
                                            마감: {item.deadline}
                                        </span>
                                    </div>

                                    {/* 2. 중단 영역 (Main Content) */}
                                    <div className="flex flex-row gap-4 sm:gap-6 flex-grow mb-4">
                                        {/* 왼쪽 텍스트 영역 */}
                                        <div className="flex-1 flex flex-col min-w-0">
                                            <h2 className="text-xl font-bold text-gray-900 mb-1 truncate">{item.name}</h2>
                                            <h3 className="text-sm font-semibold text-gray-500 mb-3 line-clamp-2">{item.title}</h3>
                                            <p className="text-gray-600 text-sm line-clamp-3 whitespace-normal">
                                                {item.description}
                                            </p>
                                        </div>

                                        {/* 오른쪽 대표 이미지 영역 */}
                                        <div className="shrink-0 flex items-start">
                                            <img
                                                src={`./image/${item.keyword}1.jpg`}
                                                alt={`${item.name} 대표 이미지`}
                                                className="w-24 h-24 sm:w-28 sm:h-28 object-cover rounded-xl shadow-sm border border-gray-200 block"
                                                onError={(e) => {
                                                    e.target.style.display = 'none';
                                                }}
                                            />
                                        </div>
                                    </div>

                                    {/* 3. 하단 영역 (Footer - Tags) */}
                                    {item.tags && item.tags.length > 0 && (
                                        <div className="flex flex-wrap gap-1.5 mt-auto pt-4 border-t border-gray-100 w-full">
                                            {item.tags.map(tag => (
                                                <span key={tag} className="text-[11px] text-gray-500 bg-gray-100 px-2 py-1 rounded break-words">
                                                    #{tag}
                                                </span>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        ))}

                        {filteredData.length === 0 && (
                            <div className="col-span-full text-center py-12 text-gray-500">
                                조건에 맞는 항목이 없습니다.
                            </div>
                        )}
                    </div>

                    {/* 모달 창 */}
                    {selectedItem && (
                        <div
                            className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 bg-black/60 backdrop-blur-sm transition-opacity"
                            onClick={closeModal}
                        >
                            <div
                                className="bg-white rounded-2xl w-full max-w-4xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden"
                                onClick={e => e.stopPropagation()}
                            >
                                {/* 모달 헤더 */}
                                <div className="flex justify-between items-center p-5 border-b border-gray-100 bg-white">
                                    <div>
                                        <span className="text-xs font-bold text-blue-600 mb-1 block">{selectedItem.category}</span>
                                        <h2 className="text-2xl font-bold text-gray-900">{selectedItem.name}</h2>
                                    </div>
                                    <button
                                        onClick={closeModal}
                                        className="text-gray-400 hover:text-gray-800 p-2 rounded-full hover:bg-gray-100 transition-colors"
                                        aria-label="닫기"
                                    >
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                </div>

                                {/* 모달 본문 (스크롤) */}
                                <div className="p-6 overflow-y-auto space-y-8 bg-gray-50">
                                    <header>
                                        <h3 className="text-xl font-semibold text-gray-800">{selectedItem.title}</h3>
                                        <p className="mt-2 text-gray-600 text-sm">{selectedItem.description}</p>
                                        <p className="mt-2 text-sm text-red-500 font-medium">마감일: {selectedItem.deadline}</p>
                                    </header>

                                    <section>
                                        <h4 className="font-bold text-lg text-gray-800 mb-3 block border-b border-gray-200 pb-2">상세 홍보 내용</h4>
                                        <div className="bg-white p-5 rounded-xl border border-gray-200 whitespace-pre-wrap text-gray-700 leading-relaxed min-h-[100px]">
                                            {modalContent}
                                        </div>
                                    </section>

                                    <section>
                                        <h4 className="font-bold text-lg text-gray-800 mb-3 block border-b border-gray-200 pb-2">갤러리 이미지</h4>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            {/* 1부터 10까지의 이미지를 시도하며 404가 나면 onError에서 숨김 처리 */}
                                            {[...Array(10)].map((_, i) => (
                                                <img
                                                    key={i}
                                                    src={`./image/${selectedItem.keyword}${i + 1}.jpg`}
                                                    alt={`${selectedItem.name} 관련 이미지 ${i + 1}`}
                                                    className="w-full h-auto rounded-xl shadow-sm border border-gray-200 object-cover"
                                                    onError={(e) => {
                                                        e.target.style.display = 'none';
                                                    }}
                                                />
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // 푸터 컨포넌트
        function Footer() {
            return (
                <footer className="bg-gray-900 text-gray-400 py-12 mt-12">
                    <div className="container mx-auto px-4">
                        <div className="flex flex-col lg:flex-row items-center justify-between gap-6 lg:gap-0">

                            {/* 좌측: 서비스 이름 및 저작권 */}
                            <div className="text-center lg:text-left flex flex-col items-center lg:items-start">
                                <h2 className="text-white text-lg font-bold mb-2">홍보 게시판</h2>
                                <p className="text-sm">김대동/eoehd1ek powered 2026</p>
                            </div>

                            {/* 중앙: 면책 조항 */}
                            <div className="text-center max-w-xl">
                                <p className="text-xs leading-relaxed opacity-70">
                                    본 서비스는 에브리타임 홍보 게시판의 데이터를 가공하여 제공합니다. <br />
                                    실시간 정보를 확인하려면 에브리타임 홍보 게시판을 방문해주세요. <br />
                                    정보 수정 및 삭제 요청은 에브리타임 게시글 쪽지로 연락바랍니다.
                                </p>
                            </div>

                            {/* 우측: 링크 및 연락처 */}
                            <div className="flex flex-col sm:flex-row items-center gap-4 text-sm mt-2 lg:mt-0">
                                <a
                                    href="https://everytime.kr/378833/v/403236148"
                                    className="hover:text-white transition-colors duration-200 border border-gray-700 bg-gray-800 px-4 py-2 rounded-lg flex items-center gap-2"
                                >
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                                    에브리타임 게시글
                                </a>
                                <a
                                    href="https://github.com/eoehd1ek/skhu-26-1-club-promotion"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="hover:text-white transition-colors duration-200 border border-gray-700 bg-gray-800 px-4 py-2 rounded-lg flex items-center gap-2"
                                >
                                    <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path fillRule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clipRule="evenodd"></path></svg>
                                    GitHub
                                </a>
                            </div>
                        </div>
                    </div>
                </footer>
            );
        }

        function Root() {
            return (
                <div className="flex flex-col min-h-screen">
                    <main className="flex-grow">
                        <App />
                    </main>
                    <Footer />
                </div>
            );
        }

        const rootElement = ReactDOM.createRoot(document.getElementById('root'));
        rootElement.render(<Root />);
    </script>
</body>

</html>
