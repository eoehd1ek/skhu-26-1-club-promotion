<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>홍보 게시판</title>
  
  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel Standalone (JSX 컴파일용) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    function App() {
      const [data, setData] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedCategory, setSelectedCategory] = useState('전체');
      const [selectedItem, setSelectedItem] = useState(null);
      const [modalContent, setModalContent] = useState('');

      // data.json 패치
      useEffect(() => {
        fetch('./data.json')
          .then(res => res.json())
          .then(jsonData => setData(jsonData))
          .catch(err => console.error("데이터를 불러오는데 실패했습니다.", err));
      }, []);

      // 모달이 열리면 contents/[keyword].txt 텍스트 파일 내용을 불러옴
      useEffect(() => {
        if (selectedItem) {
          setModalContent('내용을 불러오는 중...');
          fetch(`./contents/${selectedItem.keyword}.txt`)
            .then(res => {
              if (!res.ok) throw new Error("파일이 없습니다.");
              return res.text();
            })
            .then(text => setModalContent(text))
            .catch(() => setModalContent("상세 내용을 불러올 수 없습니다."));
        } else {
          setModalContent('');
        }
      }, [selectedItem]);

      // 카테고리 중복 제거 추출
      const categories = useMemo(() => {
        const cats = data.map(item => item.category).filter(Boolean);
        return ['전체', ...new Set(cats)];
      }, [data]);

      // 필터링 규칙 적용
      const filteredData = useMemo(() => {
        return data.filter(item => {
          // 1. 카테고리 필터
          const matchCategory = selectedCategory === '전체' || item.category === selectedCategory;
          
          // 2. 검색어 필터 (JSON의 모든 필드를 순회하며 체크)
          const lowerQuery = searchQuery.toLowerCase();
          const matchSearch = Object.values(item).some(val => 
            val != null && String(val).toLowerCase().includes(lowerQuery)
          );

          return matchCategory && matchSearch;
        });
      }, [data, selectedCategory, searchQuery]);

      const closeModal = () => setSelectedItem(null);

      return (
        <div className="container mx-auto px-4 py-8">
          <h1 className="text-3xl font-extrabold text-center mb-8 text-gray-900">우리 학교 동아리 / 단체 홍보</h1>

          {/* 검색 및 카테고리 필터 영역 */}
          <div className="mb-8 space-y-4 max-w-3xl mx-auto">
            <input 
              type="text" 
              placeholder="검색어를 입력하세요 (이름, 키워드, 설명 등 모든 항목 검색)" 
              className="w-full p-4 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
              value={searchQuery}
              onChange={(e) => setSearchQuery(e.target.value)}
            />
            
            <div className="flex flex-wrap gap-2 justify-center">
              {categories.map(cat => (
                <button 
                  key={cat}
                  onClick={() => setSelectedCategory(cat)}
                  className={`px-4 py-2 rounded-full text-sm font-semibold transition-colors duration-200 shadow-sm
                    ${selectedCategory === cat 
                      ? 'bg-blue-600 text-white border-blue-600' 
                      : 'bg-white text-gray-600 border border-gray-300 hover:bg-gray-100'
                    }`}
                >
                  {cat}
                </button>
              ))}
            </div>
          </div>

          {/* 목록 카드 레이아웃 (반응형 1 -> 2 -> 3) */}
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {filteredData.map(item => (
              <div 
                key={item.id} 
                onClick={() => setSelectedItem(item)}
                className="bg-white rounded-2xl shadow-md hover:shadow-xl hover:-translate-y-1 transition-all duration-300 cursor-pointer overflow-hidden border border-gray-100 flex flex-col h-full"
              >
                <div className="p-5 sm:p-6 flex-grow flex flex-row gap-4 sm:gap-6">
                  {/* 왼쪽 텍스트 영역 */}
                  <div className="flex flex-col flex-grow min-w-0">
                    <div className="flex items-start justify-between mb-3">
                      <span className="bg-blue-50 text-blue-600 text-xs font-bold px-2.5 py-1 rounded-md max-w-fit truncate mr-2">
                        {item.category}
                      </span>
                      <span className="text-xs text-gray-500 font-medium shrink-0">
                        마감: {item.deadline}
                      </span>
                    </div>
                    <h2 className="text-xl font-bold text-gray-900 mb-1 truncate">{item.name}</h2>
                    <h3 className="text-sm font-semibold text-gray-500 mb-3 truncate">{item.title}</h3>
                    <p className="text-gray-600 text-sm line-clamp-3 mb-4 flex-grow">
                      {item.description}
                    </p>
                    
                    {item.tags && item.tags.length > 0 && (
                      <div className="flex flex-wrap gap-1.5 mt-auto pt-4 border-t border-gray-100">
                        {item.tags.map(tag => (
                          <span key={tag} className="text-[11px] text-gray-500 bg-gray-100 px-2 py-1 rounded">
                            #{tag}
                          </span>
                        ))}
                      </div>
                    )}
                  </div>
                  
                  {/* 오른쪽 대표 이미지 영역 */}
                  <div className="shrink-0 flex items-center">
                    <img 
                      src={`./image/${item.keyword}1.jpg`} 
                      alt={`${item.name} 대표 이미지`}
                      className="w-24 h-24 sm:w-28 sm:h-28 object-cover rounded-xl shadow-sm border border-gray-200"
                      onError={(e) => {
                        e.target.style.display = 'none';
                      }}
                    />
                  </div>
                </div>
              </div>
            ))}
            
            {filteredData.length === 0 && (
              <div className="col-span-full text-center py-12 text-gray-500">
                조건에 맞는 항목이 없습니다.
              </div>
            )}
          </div>

          {/* 모달 창 */}
          {selectedItem && (
            <div 
              className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 bg-black/60 backdrop-blur-sm transition-opacity"
              onClick={closeModal}
            >
              <div 
                className="bg-white rounded-2xl w-full max-w-4xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden" 
                onClick={e => e.stopPropagation()}
              >
                {/* 모달 헤더 */}
                <div className="flex justify-between items-center p-5 border-b border-gray-100 bg-white">
                  <div>
                    <span className="text-xs font-bold text-blue-600 mb-1 block">{selectedItem.category}</span>
                    <h2 className="text-2xl font-bold text-gray-900">{selectedItem.name}</h2>
                  </div>
                  <button 
                    onClick={closeModal} 
                    className="text-gray-400 hover:text-gray-800 p-2 rounded-full hover:bg-gray-100 transition-colors"
                    aria-label="닫기"
                  >
                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                  </button>
                </div>
                
                {/* 모달 본문 (스크롤) */}
                <div className="p-6 overflow-y-auto space-y-8 bg-gray-50">
                  <header>
                    <h3 className="text-xl font-semibold text-gray-800">{selectedItem.title}</h3>
                    <p className="mt-2 text-gray-600 text-sm">{selectedItem.description}</p>
                    <p className="mt-2 text-sm text-red-500 font-medium">마감일: {selectedItem.deadline}</p>
                  </header>

                  <section>
                    <h4 className="font-bold text-lg text-gray-800 mb-3 block border-b border-gray-200 pb-2">상세 홍보 내용</h4>
                    <div className="bg-white p-5 rounded-xl border border-gray-200 whitespace-pre-wrap text-gray-700 leading-relaxed min-h-[100px]">
                      {modalContent}
                    </div>
                  </section>

                  <section>
                    <h4 className="font-bold text-lg text-gray-800 mb-3 block border-b border-gray-200 pb-2">갤러리 이미지</h4>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      {/* 1부터 10까지의 이미지를 시도하며 404가 나면 onError에서 숨김 처리 */}
                      {[...Array(10)].map((_, i) => (
                        <img 
                          key={i}
                          src={`./image/${selectedItem.keyword}${i+1}.jpg`} 
                          alt={`${selectedItem.name} 관련 이미지 ${i+1}`}
                          className="w-full h-auto rounded-xl shadow-sm border border-gray-200 object-cover"
                          onError={(e) => {
                            e.target.style.display = 'none';
                          }}
                        />
                      ))}
                    </div>
                  </section>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
